name: Staging CI

on:
  push:
    branches:
      - staging

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_SERVER_PORT: ${{ secrets.API_SERVER_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Docker Buildx (for DB container)
        uses: docker/setup-buildx-action@v3

      # --- Server Checks ---
      - name: Install server dependencies
        run: bun install --frozen-lockfile
        working-directory: ./server

      - name: Check server type errors
        run: bun run tsc
        working-directory: ./server

      - name: Start PostgreSQL container and run Drizzle migrations
        run: bun run db-create
        working-directory: ./server

      - name: Run server tests
        run: bun test
        working-directory: ./server

      - name: Stop PostgreSQL container
        if: always()
        run: docker rm myearth-db
        working-directory: ./server

      # --- Client Checks ---
      - name: Install client dependencies
        run: bun install --frozen-lockfile
        working-directory: ./client

      - name: Check client type errors
        run: bun run tsc
        working-directory: ./client

      - name: Run client tests
        run: bun test
        working-directory: ./client

  # Only run if build-and-test succeeds
  merge-to-main:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging into main
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git merge origin/staging -m "Merge staging into main after successful CI"
          git push
